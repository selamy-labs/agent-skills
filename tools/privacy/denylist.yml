secret_patterns:
  - label: GitHub classic token
    pattern: 'ghp_[A-Za-z0-9_]{20,}'
  - label: GitHub fine-grained token
    pattern: 'github_pat_[A-Za-z0-9_]{20,}'
  - label: API key token
    pattern: '\bsk-[A-Za-z0-9_-]{20,}\b'
  - label: private key PEM
    pattern: '-----BEGIN [A-Z ]*PRIVATE KEY-----'
  - label: IPv4 address
    pattern: '\b\d{1,3}(?:\.\d{1,3}){3}\b'
  - label: GSM secret path
    pattern: '\b(?:gsm|secret-manager|google-secret-manager)://[A-Za-z0-9_./-]+'
    flags: IGNORECASE
  - label: pass entry path
    pattern: '\bpass(?: show)? [A-Za-z0-9_./-]+'
    flags: IGNORECASE
  - label: localhost identity
    pattern: '\b[A-Za-z0-9._%+-]+@localhost\b'
    flags: IGNORECASE
  - label: internal group/user
    pattern: '\bpatrick-agents\b'
    flags: IGNORECASE
  - label: internal service host
    pattern: '\b[A-Za-z0-9-]+(?:\.[A-Za-z0-9-]+)*\.selamy\.dev\b'
    flags: IGNORECASE
  - label: local home path
    pattern: '/home/[A-Za-z0-9._-]+/'
  - label: state-file path
    pattern: '/tmp/tmux-session-state[A-Za-z0-9._/-]*'
