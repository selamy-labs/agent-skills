# Privacy scanner denylist — SINGLE SOURCE OF TRUTH
# All repos consuming privacy scanning pin to this file.
# Changes here propagate to every consumer on their next version bump.
#
# Categories:
#   org_product       — internal product and project names
#   business_person   — people, vendors, partners
#   internal_process  — internal tooling and workflow names
#   counterpart_leak  — phrases that reveal repo structure
#   silence_phrase    — phrases that suppress disclosure
#   source_origin     — product/platform names used for source-lineage checks
#                       (subset of org_product consumed by private repos)

