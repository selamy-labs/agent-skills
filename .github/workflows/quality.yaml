name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Skill Quality And Privacy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint SKILL.md files
        run: python scripts/lint_skills.py
      - name: Block public information leaks
        run: python scripts/privacy_scan.py
