name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Skill Quality And Privacy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Lint SKILL.md files
        run: python scripts/lint_skills.py
      - name: Block public information leaks
        run: python scripts/privacy_scan.py
      - name: Test privacy scanner
        run: python scripts/test_privacy_scan.py
      - name: Check public API stability
        run: python scripts/public_api_stability.py
      - name: Test semantic release planner
        run: python scripts/test_semantic_release.py
      - name: Validate PR title for squash release
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python scripts/validate_pr_title.py --title "$PR_TITLE" --body "$PR_BODY"
